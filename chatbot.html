<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot | चिलुआ गाँव</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#2d6a4f;--gold:#e9c46a;--cream:#fefae0;--dark:#1b1b1b;--muted:#6b7280;--card:#f9f6ee;--border:#d4c99a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--dark);height:100vh;display:flex;flex-direction:column;}
  nav{background:var(--green);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;flex-shrink:0;}
  .nb{color:var(--gold);font-family:'Playfair Display',serif;font-size:1.3rem;padding:14px 0;text-decoration:none;}
  .nl{display:flex;flex-wrap:wrap;gap:4px;padding:8px 0;}
  .nl a{color:#d1fae5;font-size:0.78rem;padding:6px 10px;border-radius:4px;text-decoration:none;}
  /* CHAT LAYOUT */
  .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:0;overflow:hidden;}
  .chat-header{background:linear-gradient(135deg,var(--green),#1b4332);color:white;padding:18px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .bot-avatar{width:48px;height:48px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
  .bot-info h3{font-size:1rem;color:white;}
  .bot-info p{font-size:0.75rem;color:#a7f3d0;}
  .online-dot{display:inline-block;width:8px;height:8px;background:#4ade80;border-radius:50%;margin-right:4px;}
  /* MESSAGES */
  .messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;background:var(--cream);}
  .msg{display:flex;gap:10px;max-width:85%;}
  .msg.bot{align-self:flex-start;}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;margin-top:4px;}
  .msg.bot .msg-avatar{background:var(--green);color:var(--gold);}
  .msg.user .msg-avatar{background:var(--gold);color:var(--dark);}
  .bubble{padding:12px 16px;border-radius:16px;font-size:0.88rem;line-height:1.6;}
  .msg.bot .bubble{background:white;border:1px solid var(--border);border-radius:4px 16px 16px 16px;}
  .msg.user .bubble{background:var(--green);color:white;border-radius:16px 4px 16px 16px;}
  .typing{display:flex;gap:4px;padding:14px 16px;background:white;border:1px solid var(--border);border-radius:4px 16px 16px 16px;width:fit-content;}
  .dot{width:8px;height:8px;background:var(--muted);border-radius:50%;animation:bounce .8s infinite;}
  .dot:nth-child(2){animation-delay:.15s;}
  .dot:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
  /* QUICK REPLIES */
  .quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 12px;flex-shrink:0;}
  .qr-btn{background:white;border:1.5px solid var(--green);color:var(--green);padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;font-weight:600;transition:all .2s;font-family:'Inter',sans-serif;}
  .qr-btn:hover{background:var(--green);color:white;}
  /* INPUT */
  .input-row{display:flex;gap:10px;padding:14px 24px;background:white;border-top:1px solid var(--border);flex-shrink:0;}
  .input-row input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:24px;font-size:0.88rem;font-family:'Inter',sans-serif;outline:none;}
  .input-row input:focus{border-color:var(--green);}
  .send-btn{background:var(--green);color:white;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .send-btn:hover{background:#40916c;}
</style>
</head>
<body>
<nav>
  <a class="nb" href="index.html">🏘️ चिलुआ गाँव</a>
  <div class="nl">
    <a href="index.html">🏠 Home</a>
    <a href="emergency.html">🚨 Emergency</a>
    <a href="complaint.html">📝 Complaint</a>
  </div>
</nav>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h3>चिलुआ AI सहायक</h3>
      <p><span class="online-dot"></span>Online — गाँव से जुड़े किसी भी सवाल का जवाब दें</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('नजदीकी अस्पताल कहाँ है?')">🏥 नजदीकी अस्पताल</button>
    <button class="qr-btn" onclick="sendQuick('मंडी भाव कैसे देखें?')">🌾 मंडी भाव</button>
    <button class="qr-btn" onclick="sendQuick('शिकायत कैसे करें?')">📝 शिकायत करें</button>
    <button class="qr-btn" onclick="sendQuick('PM Kisan Yojana के बारे में बताओ')">📋 PM Kisan</button>
    <button class="qr-btn" onclick="sendQuick('Emergency नंबर बताओ')">🚨 Emergency</button>
    <button class="qr-btn" onclick="sendQuick('गाँव का पिन कोड क्या है?')">📮 PIN Code</button>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="कोई भी सवाल पूछें..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const VILLAGE_CONTEXT = `
तुम चिलुआ गाँव के AI सहायक हो। चिलुआ, हाटा तहसील, कुशीनगर जिला, उत्तर प्रदेश में है।
पिन कोड: 274207 | जनसंख्या: 1562 | घर: 259 | साक्षरता: 59.67%
कुशीनगर से दूरी: 43 km | हाटा से: 12 km | नजदीकी Airport: Gorakhpur (18.5 km)
नजदीकी Railway Station: Mahuawa Khurd
कोई बैंक, ATM, PHC गाँव में नहीं — 5-10 km दूर
Transport: साझा Auto-Rickshaw

Emergency Numbers: Police 100 | Ambulance 108 | Fire 101 | Bijli 1912
Kisan Helpline: 1800-180-1551 | PM Kisan: pmkisan.gov.in

Website pages:
- complaint.html → शिकायत दर्ज करें
- farmers.html → मंडी भाव और मौसम
- emergency.html → Emergency Contacts
- panchayat.html → Gram Pradhan info
- schemes.html → Govt Schemes
- health.html → Health info
- education.html → Schools

हमेशा हिंदी में जवाब दो। छोटे और सीधे जवाब दो। अगर local phone number नहीं पता तो Gram Pradhan से मिलने को कहो।
`;

const conversation = [{role:'user', content: VILLAGE_CONTEXT + '\n\nपहले एक स्वागत संदेश दो — 2 लाइन में।'}];

function addMsg(text, who){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = `<div class="msg-avatar">${who==='bot'?'🤖':'👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

async function callClaude(userMsg){
  conversation.push({role:'user', content: userMsg});
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:400,
        messages: conversation.slice(-10)
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'माफ करें, जवाब नहीं आया। दोबारा कोशिश करें।';
    conversation.push({role:'assistant', content: reply});
    return reply;
  } catch(e){
    return 'Internet connection problem। कृपया दोबारा कोशिश करें।';
  }
}

async function sendMsg(){
  const inp = document.getElementById('userInput');
  const msg = inp.value.trim();
  if(!msg) return;
  inp.value = '';
  addMsg(msg, 'user');
  showTyping();
  const reply = await callClaude(msg);
  removeTyping();
  addMsg(reply, 'bot');
}

function sendQuick(msg){
  document.getElementById('userInput').value = msg;
  sendMsg();
}

// Welcome message
(async()=>{
  showTyping();
  const welcome = await callClaude('');
  removeTyping();
  addMsg(welcome, 'bot');
})();
</script>
</body></html>
